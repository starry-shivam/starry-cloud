services:
  starry-cloud:
    container_name: starry-cloud
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=2
    volumes:
      # App settings file (create from config.example.yml):
      - ./config.yml:/app/config.yml:ro
      # Auth secrets file — generate with:
      # docker compose run --rm starry-cloud python3 gen_auth.py
      - ./auth.yml:/app/auth.yml:ro
      # Mount root fs (read-only) for live system info (e.g. CPU, RAM, disk usage):
      - /:/host/root:ro