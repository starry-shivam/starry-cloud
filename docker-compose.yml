services:
  starry-cloud:
    container_name: starry-cloud
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=2
    volumes:
      # App settings file (create from config.example.yml):
      - ./config.yml:/app/config.yml:ro
      # Auth secrets file (generated by gen_auth.py):
      - ./auth.yml:/app/auth.yml:ro
      - /:/host/root:ro