<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ cfg.title }} - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (function() {
        const saved = localStorage.getItem("theme") || "auto";
        const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved === "auto" ? (isDark ? "dark" : "light") : saved;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="/static/berry.png" />
  </head>
  <body>
    <div class="page page-auth">
      <main class="auth-shell">
        <section class="auth-card" aria-labelledby="loginTitle">
          <h1 id="loginTitle" class="title">Sign in</h1>
          {% if cfg.subtitle %}
          <p class="subtitle">{{ cfg.subtitle }}</p>
          {% endif %}
          {% if error %}
          <p class="auth-error" role="alert">{{ error }}</p>
          {% endif %}
          <form method="post" class="auth-form" autocomplete="on">
            <label class="auth-label" for="username">Username</label>
            <input class="auth-input" id="username" name="username" type="text" required autofocus />

            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" id="password" name="password" type="password" required />

            <button class="auth-submit" type="submit">Continue</button>
          </form>
        </section>
      </main>
    </div>
    <script src="/static/js/ui.js"></script>
  </body>
</html>
